version: '3.8'

services:
  care-tracker:
    build: .
    container_name: care-tracker
    ports:
      - "8273:8273"
    volumes:
      # Persist the database file to a local data directory
      - ./data:/data
    environment:
      - DATA_DIR=/data
      - TZ=America/New_York
      - ROOT_PATH=/care
      # AUTH_SECRET_KEY must be set in .env for sessions to survive container restarts.
      # Generate one with: python -c "import secrets; print(secrets.token_urlsafe(64))"
      - AUTH_SECRET_KEY=${AUTH_SECRET_KEY}
      # Secure cookies are only sent by browsers over HTTPS.
      # All access goes through Caddy (HTTPS), including the kiosk tablet.
      - SECURE_COOKIES=true
    restart: unless-stopped
    networks:
      - default
      - proxy

# Shared reverse proxy network — created manually: docker network create proxy
# Allows Caddy to route traffic to this container by name (care-tracker:8273)
networks:
  proxy:
    external: true


